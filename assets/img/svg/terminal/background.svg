<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Gradiente Aero Glass Translúcido para o fundo dos circuitos -->
    <linearGradient id="aeroGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#4facfe" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#07080c" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Gradiente de Vinheta para dar profundidade de terminal táctico -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#07080c" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.85"/>
    </radialGradient>
  </defs>

  <!-- Fundo Sólido Dark Terminal -->
  <rect width="100%" height="100%" fill="#07080c"/>

  <!-- Grupo das Linhas de Circuito Camufladas com Opacidade Suave -->
  <g>
    <!-- Linhas e barramentos que guiam o fluxo até ao nó central -->
    <path d="M0,150 L400,150 L550,300 L1200,300 L1350,150 L1920,150" fill="none" stroke="url(#aeroGlass)" stroke-width="2.5" stroke-dasharray="6,4"/>
    <path d="M200,900 L600,900 L750,750 L1500,750 L1650,900 M1100,750 L1200,600 L1800,600" fill="none" stroke="url(#aeroGlass)" stroke-width="2.5"/>
    
    <!-- Nós e pontos de ancoragem onde o blob do coração vai assentar -->
    <circle cx="550" cy="300" r="5" fill="#00f2fe"/>
    <circle cx="1350" cy="150" r="5" fill="#00f2fe"/>
    <circle cx="750" cy="750" r="6" fill="#ff007f"/>
  </g>

  <!-- Vinheta de Profundidade Superior -->
  <rect width="100%" height="100%" fill="url(#vignette)" pointer-events="none"/>
</svg>
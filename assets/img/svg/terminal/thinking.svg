<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%"><defs><linearGradient id="thinkingAero" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00f2fe" /><stop offset="100%" stop-color="#ff007f" /></linearGradient><radialGradient id="coreGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffffff" stop-opacity="1" /><stop offset="35%" stop-color="#00f2fe" stop-opacity="0.8" /><stop offset="70%" stop-color="#ff007f" stop-opacity="0.3" /><stop offset="100%" stop-color="#07080c" stop-opacity="0" /></radialGradient></defs><style>@keyframes spinClockwise { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } @keyframes spinCounterClockwise { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } } @keyframes corePulse { 0%, 100% { opacity: 0.4; transform: scale(0.9); } 50% { opacity: 0.9; transform: scale(1.1); } } .ring-outer { transform-origin: center; animation: spinClockwise 5s linear infinite; } .ring-inner { transform-origin: center; animation: spinCounterClockwise 7s linear infinite; } .center-glow { transform-origin: center; animation: corePulse 2s ease-in-out infinite; }</style><rect width="100%" height="100%" fill="#07080c"/><g><circle class="center-glow" cx="200" cy="200" r="35" fill="url(#coreGlow)" /><circle cx="200" cy="200" r="5" fill="#ffffff" /><circle class="ring-outer" cx="200" cy="200" r="85" fill="none" stroke="url(#thinkingAero)" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="140 40 20 30 60 50" /><circle class="ring-inner" cx="200" cy="200" r="55" fill="none" stroke="#00f2fe" stroke-width="2" stroke-linecap="round" stroke-dasharray="50 30 70 30" opacity="0.6" /><g class="ring-outer"><circle cx="200" cy="115" r="5" fill="#ff007f" /><circle cx="200" cy="285" r="4" fill="#00f2fe" /></g><g class="ring-inner"><circle cx="145" cy="200" r="3.5" fill="#ffffff" /><circle cx="255" cy="200" r="3.5" fill="#a020f0" /></g></g></svg>